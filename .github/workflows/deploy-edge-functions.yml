# Синхронизирует Edge Functions и секреты Supabase из GitHub Secrets.
# Нужно добавить в Settings → Secrets and variables → Actions:
#   SUPABASE_ACCESS_TOKEN — Personal Access Token с правами на проект
#   SUPABASE_PROJECT_REF — goklwsqotbwsyzctzknh
#   DEEPSEEK_API_KEY — ключ DeepSeek API
name: Deploy Supabase Edge Functions

on:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase project
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}

      - name: Set Edge Function secrets
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase secrets set \
            DEEPSEEK_API_KEY="${{ secrets.DEEPSEEK_API_KEY }}" \
            --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}

      - name: Deploy ai-chat function
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase functions deploy ai-chat --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
