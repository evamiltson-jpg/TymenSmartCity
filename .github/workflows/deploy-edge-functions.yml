# Синхронизирует Edge Functions и секреты Supabase из GitHub Secrets.
#
# Добавьте в GitHub → Settings → Secrets and variables → Actions:
#   SUPABASE_ACCESS_TOKEN  — Personal Access Token (supabase.com/dashboard/account/tokens)
#   SUPABASE_PROJECT_REF   — goklwsqotbwsyzctzknh
#   GROQ_API_KEY           — ключ с console.groq.com (бесплатный tier)
#   GEMINI_API_KEY         — ключ с aistudio.google.com/apikey (бесплатный tier)
#   DEEPSEEK_API_KEY       — опционально, запасной провайдер
#
# Порядок fallback настраивается секретом AI_PROVIDER_ORDER (по умолчанию groq,gemini,deepseek)
name: Deploy Supabase Edge Functions

on:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/**'
      - '.github/workflows/deploy-edge-functions.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase project
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}

      - name: Set Edge Function secrets
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          ARGS="AI_PROVIDER_ORDER=groq,gemini"
          if [ -n "${{ secrets.GROQ_API_KEY }}" ]; then
            ARGS="$ARGS GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}"
          fi
          if [ -n "${{ secrets.GEMINI_API_KEY }}" ]; then
            ARGS="$ARGS GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}"
          fi
          if [ -n "${{ secrets.DEEPSEEK_API_KEY }}" ]; then
            ARGS="$ARGS DEEPSEEK_API_KEY=${{ secrets.DEEPSEEK_API_KEY }}"
          fi
          supabase secrets set $ARGS --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}

      - name: Deploy ai-chat function
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase functions deploy ai-chat --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
