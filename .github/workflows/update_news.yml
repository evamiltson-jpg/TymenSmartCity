name: Auto Update News and Events

on:
  schedule:
    - cron: '0 5,17 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Run news parser
        run: python parsers/news_parser.py

      - name: Run university news parser (ТИУ + ТюмГУ)
        run: python parsers/university_news_parser.py

      - name: Run events parser
        run: python parsers/events_parser.py

      - name: Commit and push changes
        env:
          BRANCH: ${{ github.ref_name }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/news_data.json public/it_news_data.json public/university_news_data.json public/events_data.json

          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Auto-update news, university news and events [skip ci]"
          git push origin "HEAD:${BRANCH}"
