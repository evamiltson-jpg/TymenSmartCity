name: Auto Update News and Events

on:
  schedule:
    - cron: '0 5,17 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4

    # Запуск парсера новостей
    - name: Run news parser
      run: |
        python parsers/news_parser.py

    - name: Run university news parser (ТИУ + ТюмГУ)
      run: |
        python parsers/university_news_parser.py

    # Парсер мероприятий: Leader-ID, ТюмГУ, ФАСИЭ
    - name: Run events parser
      run: |
        python parsers/events_parser.py

    - name: Commit and push changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add public/news_data.json public/it_news_data.json public/university_news_data.json university_news_data.json public/events_data.json events_data.json
        git diff-index --quiet HEAD || (git commit -m "Auto-update news, university news and events" && git push)
    
    